<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130" width="400" height="130">

  <!-- ══════════════════════════════════
       CIRCULAR BADGE — left side
  ══════════════════════════════════ -->

  <!-- Outer green ring -->
  <circle cx="65" cy="65" r="62" fill="#00A651"/>
  <!-- Inner navy circle -->
  <circle cx="65" cy="65" r="50" fill="#1B2A6B"/>
  <!-- Green ground strip -->
  <path d="M 18 82 Q 65 98 112 82 L 112 95 Q 65 110 18 95 Z" fill="#00A651"/>

  <!-- White house body -->
  <rect x="40" y="70" width="50" height="20" fill="white"/>
  <!-- White roof -->
  <polygon points="65,34 98,70 32,70" fill="white"/>
  <!-- Chimney -->
  <rect x="78" y="33" width="8" height="16" fill="#00A651"/>
  <rect x="76" y="31" width="12" height="5" rx="1" fill="#00A651"/>
  <!-- Door (navy) -->
  <rect x="58" y="78" width="14" height="12" rx="1" fill="#1B2A6B"/>

  <!-- Left window -->
  <rect x="41" y="72" width="12" height="11" rx="1" fill="#00A651"/>
  <line x1="47" y1="72" x2="47" y2="83" stroke="white" stroke-width="1.5"/>
  <line x1="41" y1="77.5" x2="53" y2="77.5" stroke="white" stroke-width="1.5"/>
  <!-- Right window -->
  <rect x="77" y="72" width="12" height="11" rx="1" fill="#00A651"/>
  <line x1="83" y1="72" x2="83" y2="83" stroke="white" stroke-width="1.5"/>
  <line x1="77" y1="77.5" x2="89" y2="77.5" stroke="white" stroke-width="1.5"/>

  <!-- ══════════════════════════════════
       "GRE" — large bold navy letters
  ══════════════════════════════════ -->
  <text
    x="145" y="80"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="72"
    fill="#1B2A6B"
    letter-spacing="2">GRE</text>

  <!-- ══════════════════════════════════
       "Gadura Real Estate, LLC" subtitle
  ══════════════════════════════════ -->
  <text
    x="148" y="104"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="19"
    fill="#222222"
    letter-spacing="0.5">Gadura Real Estate, LLC</text>

</svg>
