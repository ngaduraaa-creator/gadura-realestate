<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Green outer ring -->
  <circle cx="50" cy="50" r="49" fill="#00A651"/>
  <!-- Navy inner background -->
  <circle cx="50" cy="50" r="38" fill="#1B2A6B"/>
  <!-- Green ground at bottom inside circle -->
  <path d="M 13.5 66 Q 50 80 86.5 66 L 86.5 82 Q 50 95 13.5 82 Z" fill="#00A651"/>
  <!-- White house body -->
  <rect x="27" y="51" width="46" height="20" fill="white"/>
  <!-- White roof -->
  <polygon points="50,23 79,51 21,51" fill="white"/>
  <!-- Green chimney (right side of roof) -->
  <rect x="61" y="22" width="7" height="15" fill="#00A651"/>
  <rect x="59" y="20" width="11" height="4" fill="#00A651"/>
  <!-- Door (navy) center bottom -->
  <rect x="44" y="60" width="12" height="11" rx="1" fill="#1B2A6B"/>
  <!-- Left window grid -->
  <rect x="29" y="54" width="10" height="10" rx="1" fill="#00A651"/>
  <line x1="34" y1="54" x2="34" y2="64" stroke="white" stroke-width="1.2"/>
  <line x1="29" y1="59" x2="39" y2="59" stroke="white" stroke-width="1.2"/>
  <!-- Right window grid -->
  <rect x="61" y="54" width="10" height="10" rx="1" fill="#00A651"/>
  <line x1="66" y1="54" x2="66" y2="64" stroke="white" stroke-width="1.2"/>
  <line x1="61" y1="59" x2="71" y2="59" stroke="white" stroke-width="1.2"/>
</svg>
