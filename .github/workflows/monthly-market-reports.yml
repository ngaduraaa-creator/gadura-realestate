name: Monthly Market Reports + IndexNow

on:
  schedule:
    # Runs at 09:00 UTC on the 1st of every month
    - cron: '0 9 1 * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute current month
        id: month
        run: echo "ym=$(date +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Generate market reports
        run: python3 scripts/generate_market_report.py --month "${{ steps.month.outputs.ym }}" --apply

      - name: Re-inject AI master schema on new reports
        run: python3 scripts/inject_ai_schema.py --apply

      - name: Re-inject FAQPage schema
        run: python3 scripts/inject_faqpage_schema.py --apply

      - name: Rebuild sitemap + specialty feeds
        run: |
          python3 scripts/rebuild_sitemap.py
          python3 scripts/build_specialty_feeds.py

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(market-reports): auto-generate ${{ steps.month.outputs.ym }} reports"
          git push

      - name: Wait 90s for Netlify auto-deploy
        run: sleep 90

      - name: Submit to IndexNow (Bing/ChatGPT/Grok/Copilot)
        run: python3 scripts/indexnow_ping.py --all
