name: Build Property Pages

on:
  push:
    paths:
      - 'data/listings.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate property pages
        run: node scripts/build-property-pages.js

      - name: Commit generated pages
        run: |
          git config user.name "gadura-pages-bot"
          git config user.email "pages-bot@gadurarealestate.com"
          git add homes/ sitemap-listings.xml
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore(pages): auto-generate property pages"
            git push
          fi
