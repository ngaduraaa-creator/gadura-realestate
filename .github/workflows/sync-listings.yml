name: Sync Listings — IDX Broker API

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run IDX Broker API sync
        run: node scripts/sync-reso.js
        env:
          IDX_BROKER_API_KEY: ${{ secrets.IDX_BROKER_API_KEY }}
          AGENT_ID_NITIN: ${{ secrets.AGENT_ID_NITIN }}
          AGENT_ID_VINOD: ${{ secrets.AGENT_ID_VINOD }}
          AGENT_ID_GAURAV: ${{ secrets.AGENT_ID_GAURAV }}

      - name: Commit updated listings.json if changed
        run: |
          git config user.email "listings-bot@gadurarealestate.com"
          git config user.name "GRE Listings Bot"
          if git diff --quiet data/listings.json; then
            echo "No changes to commit"
          else
            git add data/listings.json
            git commit -m "chore(listings): auto-sync from IDX Broker API"
            git push
            echo "listings.json committed and pushed"
          fi
