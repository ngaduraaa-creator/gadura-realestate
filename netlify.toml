# Netlify configuration for gadurarealestate.com

[build]
  publish = "."

# === .well-known files (Netlify reserves /.well-known/ path) ===
[[redirects]]
  from = "/.well-known/ai-plugin.json"
  to = "/well-known/ai-plugin.json"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/security.txt"
  to = "/well-known/security.txt"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/humans.txt"
  to = "/well-known/humans.txt"
  status = 200
  force = true

# === Legacy URL pattern catch-alls (resolves GSC 'Not Found 404' reports) ===

# Old listing URL patterns
[[redirects]]
  from = "/listing/*"
  to = "/listings/"
